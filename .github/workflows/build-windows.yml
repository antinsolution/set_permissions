name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE x64
        run: |
          pyinstaller --onefile --windowed permission_tool.py

      - name: Upload x64
        uses: actions/upload-artifact@v4
        with:
          name: PermissionTool-x64
          path: dist/*.exe

  build-x86:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x86'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE x86
        run: |
          pyinstaller --onefile --windowed permission_tool.py

      - name: Upload x86
        uses: actions/upload-artifact@v4
        with:
          name: PermissionTool-x86
          path: dist/*.exe
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
